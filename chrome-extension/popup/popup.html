<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <link rel="stylesheet" href="popup.css">
  <title>AICareerPivot</title>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span>AICareerPivot</span>
      </div>
      <div class="header-actions">
        <button id="settingsBtn" class="icon-btn" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Not signed in -->
    <div id="signInView" class="view" hidden>
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="1.5">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <p>Sign in to start saving jobs</p>
        <button id="signInBtn" class="btn-primary">Set Up Account</button>
      </div>
    </div>

    <!-- Default state: pipeline + recent saves -->
    <div id="defaultView" class="view" hidden>
      <div id="pipeline" class="pipeline">
        <div class="pipeline-stage" data-stage="saved">
          <span class="pipeline-dot bg-slate"></span>
          <span class="pipeline-count" id="countSaved">0</span>
          <span class="pipeline-label">Saved</span>
        </div>
        <div class="pipeline-arrow">→</div>
        <div class="pipeline-stage" data-stage="applied">
          <span class="pipeline-dot bg-teal"></span>
          <span class="pipeline-count" id="countApplied">0</span>
          <span class="pipeline-label">Applied</span>
        </div>
        <div class="pipeline-arrow">→</div>
        <div class="pipeline-stage" data-stage="interview">
          <span class="pipeline-dot bg-amber"></span>
          <span class="pipeline-count" id="countInterview">0</span>
          <span class="pipeline-label">Interview</span>
        </div>
        <div class="pipeline-arrow">→</div>
        <div class="pipeline-stage" data-stage="offer">
          <span class="pipeline-dot bg-emerald"></span>
          <span class="pipeline-count" id="countOffer">0</span>
          <span class="pipeline-label">Offer</span>
        </div>
      </div>

      <div class="section-title">Recent Saves</div>
      <div id="recentSaves" class="recent-saves"></div>

      <div class="actions">
        <button id="pasteUrlBtn" class="btn-primary">Paste Job URL</button>
        <button id="openDashboardBtn" class="btn-link">Open Dashboard →</button>
      </div>
    </div>

    <!-- Job detected state -->
    <div id="jobView" class="view" hidden>
      <div id="jobCard" class="job-card">
        <div class="job-card-header">
          <div class="company-icon" id="companyIcon"></div>
          <div class="job-card-info">
            <div class="job-title" id="jobTitle"></div>
            <div class="job-company" id="jobCompany"></div>
            <div class="job-meta">
              <span id="jobLocation"></span>
              <span id="jobSalary"></span>
              <span class="source-badge" id="jobSource"></span>
            </div>
          </div>
        </div>
      </div>

      <div id="scoreSection" class="score-section" hidden>
        <div class="score-ring" id="scoreRing"></div>
        <div class="score-metrics">
          <div class="metric">
            <span class="metric-val" id="matchedCount">0</span>
            <span class="metric-label">Keywords</span>
          </div>
          <div class="metric">
            <span class="metric-val" id="transferableCount">0</span>
            <span class="metric-label">Transferable</span>
          </div>
          <div class="metric">
            <span class="metric-val" id="missingCount">0</span>
            <span class="metric-label">Missing</span>
          </div>
        </div>

        <details class="keyword-details">
          <summary>Keyword Breakdown</summary>
          <div id="keywordBreakdown" class="keyword-list"></div>
        </details>
      </div>

      <div id="saveCTA" class="save-cta">
        <button id="saveBtn" class="btn-primary btn-full">Save & Track</button>
      </div>

      <div id="savedCTA" class="save-cta" hidden>
        <div class="saved-indicator">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#10b981" stroke="#10b981" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          <span>Saved</span>
          <span class="stage-badge" id="currentStage"></span>
        </div>
        <div class="saved-actions">
          <button id="viewInTrackerBtn" class="btn-link">View in Tracker</button>
          <button id="rescoreBtn" class="btn-link">Re-score</button>
        </div>
      </div>
    </div>

    <!-- Loading state -->
    <div id="loadingView" class="view" hidden>
      <div class="skeleton-card">
        <div class="skeleton-line w-60"></div>
        <div class="skeleton-line w-40"></div>
        <div class="skeleton-ring"></div>
        <div class="skeleton-line w-80"></div>
      </div>
    </div>

    <!-- Sync footer -->
    <footer id="footer">
      <span class="sync-dot" id="syncDot"></span>
      <span id="syncText">Checking...</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
