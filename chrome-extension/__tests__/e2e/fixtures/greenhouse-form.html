<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Greenhouse Application Fixture</title></head>
<body>
  <div id="application">
    <h2>Apply for Senior Software Engineer at TechCorp</h2>
    <form id="application_form">
      <div class="field">
        <label for="first_name">First Name *</label>
        <input type="text" id="first_name" name="first_name" required>
      </div>
      <div class="field">
        <label for="last_name">Last Name *</label>
        <input type="text" id="last_name" name="last_name" required>
      </div>
      <div class="field">
        <label for="email">Email *</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="field">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone">
      </div>
      <div class="field">
        <label for="resume">Resume/CV *</label>
        <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx">
      </div>
      <div class="field">
        <label for="cover_letter">Cover Letter</label>
        <textarea id="cover_letter" name="cover_letter" rows="6"></textarea>
      </div>
      <div class="field">
        <label for="linkedin">LinkedIn Profile</label>
        <input type="url" id="linkedin" name="linkedin_profile">
      </div>
      <div class="field">
        <label for="github">GitHub Profile</label>
        <input type="url" id="github" name="github">
      </div>
      <div class="field">
        <label for="q1">Why do you want to work at TechCorp?</label>
        <textarea id="q1" name="question_1" rows="5"></textarea>
      </div>
      <button type="submit">Submit Application</button>
    </form>
  </div>
</body>
</html>
