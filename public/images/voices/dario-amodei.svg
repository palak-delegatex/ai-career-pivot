<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0514"/>
      <stop offset="60%" style="stop-color:#0f0a1e"/>
      <stop offset="100%" style="stop-color:#030712"/>
    </linearGradient>
    <radialGradient id="dusk" cx="20%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#f43f5e;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#f43f5e;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="neural-glow" cx="72%" cy="35%" r="35%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="floor-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#030712;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#030712;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.01"/>
    </linearGradient>
    <linearGradient id="sidelight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.35"/>
      <stop offset="30%" style="stop-color:#f97316;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#f43f5e;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.55"/>
    </radialGradient>
    <filter id="gblur">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="sblur">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Base deep midnight -->
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#dusk)"/>
  <rect width="1600" height="900" fill="url(#neural-glow)"/>

  <!-- Amber warm side light from left -->
  <rect x="0" y="0" width="300" height="900" fill="url(#sidelight)" filter="url(#gblur)"/>

  <!-- Floor-to-ceiling window mullions -->
  <rect x="620" y="0" width="2" height="900" fill="#ffffff" opacity="0.05"/>
  <rect x="840" y="0" width="2" height="900" fill="#ffffff" opacity="0.04"/>
  <rect x="1060" y="0" width="2" height="900" fill="#ffffff" opacity="0.04"/>
  <rect x="1280" y="0" width="2" height="900" fill="#ffffff" opacity="0.03"/>
  <!-- Window glass sheen -->
  <rect x="622" y="0" width="216" height="900" fill="url(#glass)"/>
  <rect x="842" y="0" width="216" height="900" fill="url(#glass)"/>

  <!-- City skyline silhouettes (dusk) -->
  <rect x="600" y="430" width="38" height="310" fill="#0c0818" opacity="0.9"/>
  <rect x="638" y="390" width="28" height="350" fill="#0d091a" opacity="0.88"/>
  <rect x="666" y="450" width="48" height="290" fill="#0c0818" opacity="0.85"/>
  <rect x="714" y="360" width="34" height="380" fill="#0d091a" opacity="0.9"/>
  <rect x="748" y="415" width="58" height="325" fill="#0c0818" opacity="0.85"/>
  <rect x="806" y="375" width="42" height="365" fill="#0d091a" opacity="0.88"/>
  <rect x="848" y="395" width="52" height="345" fill="#0c0818" opacity="0.85"/>
  <rect x="900" y="340" width="38" height="400" fill="#0d091a" opacity="0.9"/>
  <rect x="938" y="410" width="62" height="330" fill="#0c0818" opacity="0.85"/>
  <rect x="1000" y="370" width="48" height="370" fill="#0d091a" opacity="0.88"/>
  <rect x="1048" y="435" width="38" height="305" fill="#0c0818" opacity="0.85"/>
  <rect x="1086" y="345" width="52" height="395" fill="#0d091a" opacity="0.9"/>
  <rect x="1138" y="385" width="68" height="355" fill="#0c0818" opacity="0.85"/>
  <rect x="1206" y="355" width="42" height="385" fill="#0d091a" opacity="0.88"/>
  <rect x="1248" y="420" width="58" height="320" fill="#0c0818" opacity="0.85"/>
  <rect x="1306" y="380" width="44" height="360" fill="#0d091a" opacity="0.88"/>
  <rect x="1350" y="440" width="36" height="300" fill="#0c0818" opacity="0.85"/>

  <!-- City lights: warm amber windows -->
  <rect x="643" y="440" width="3" height="2" fill="#fbbf24" opacity="0.55"/>
  <rect x="654" y="458" width="3" height="2" fill="#fde68a" opacity="0.45"/>
  <rect x="720" y="388" width="3" height="2" fill="#f97316" opacity="0.5"/>
  <rect x="730" y="405" width="3" height="2" fill="#fbbf24" opacity="0.55"/>
  <rect x="856" y="420" width="3" height="2" fill="#fbbf24" opacity="0.5"/>
  <rect x="872" y="440" width="3" height="2" fill="#fde68a" opacity="0.42"/>
  <rect x="912" y="368" width="3" height="2" fill="#fbbf24" opacity="0.5"/>
  <rect x="928" y="388" width="3" height="2" fill="#f97316" opacity="0.55"/>
  <rect x="1007" y="398" width="3" height="2" fill="#fbbf24" opacity="0.5"/>
  <rect x="1020" y="415" width="3" height="2" fill="#fde68a" opacity="0.42"/>
  <rect x="1094" y="372" width="3" height="2" fill="#fbbf24" opacity="0.55"/>
  <rect x="1110" y="390" width="3" height="2" fill="#f97316" opacity="0.5"/>
  <rect x="1148" y="408" width="3" height="2" fill="#fbbf24" opacity="0.5"/>
  <rect x="1165" y="425" width="3" height="2" fill="#fde68a" opacity="0.42"/>
  <rect x="1214" y="380" width="3" height="2" fill="#fbbf24" opacity="0.55"/>
  <rect x="1230" y="398" width="3" height="2" fill="#f97316" opacity="0.5"/>

  <!-- Horizon city glow -->
  <ellipse cx="960" cy="760" rx="520" ry="70" fill="#f97316" opacity="0.05" filter="url(#gblur)"/>

  <!-- Neural network viz floating in window reflection -->
  <circle cx="760" cy="215" r="5" fill="#2dd4bf" opacity="0.65"/>
  <circle cx="835" cy="172" r="4" fill="#14b8a6" opacity="0.58"/>
  <circle cx="912" cy="242" r="6" fill="#2dd4bf" opacity="0.62"/>
  <circle cx="985" cy="185" r="4" fill="#14b8a6" opacity="0.55"/>
  <circle cx="1055" cy="260" r="5" fill="#2dd4bf" opacity="0.58"/>
  <circle cx="1125" cy="195" r="4" fill="#0d9488" opacity="0.62"/>
  <circle cx="1195" cy="252" r="5" fill="#2dd4bf" opacity="0.58"/>
  <circle cx="1255" cy="175" r="4" fill="#14b8a6" opacity="0.52"/>
  <circle cx="792" cy="295" r="3" fill="#2dd4bf" opacity="0.48"/>
  <circle cx="870" cy="315" r="4" fill="#14b8a6" opacity="0.52"/>
  <circle cx="950" cy="285" r="3" fill="#2dd4bf" opacity="0.48"/>
  <circle cx="1032" cy="332" r="4" fill="#0d9488" opacity="0.52"/>
  <circle cx="1102" cy="295" r="3" fill="#2dd4bf" opacity="0.48"/>
  <circle cx="1172" cy="325" r="4" fill="#14b8a6" opacity="0.48"/>
  <!-- Connection lines -->
  <line x1="760" y1="215" x2="835" y2="172" stroke="#2dd4bf" stroke-width="0.7" opacity="0.28"/>
  <line x1="835" y1="172" x2="912" y2="242" stroke="#14b8a6" stroke-width="0.7" opacity="0.26"/>
  <line x1="912" y1="242" x2="985" y2="185" stroke="#2dd4bf" stroke-width="0.7" opacity="0.28"/>
  <line x1="985" y1="185" x2="1055" y2="260" stroke="#14b8a6" stroke-width="0.7" opacity="0.26"/>
  <line x1="1055" y1="260" x2="1125" y2="195" stroke="#2dd4bf" stroke-width="0.7" opacity="0.28"/>
  <line x1="1125" y1="195" x2="1195" y2="252" stroke="#14b8a6" stroke-width="0.7" opacity="0.26"/>
  <line x1="1195" y1="252" x2="1255" y2="175" stroke="#2dd4bf" stroke-width="0.7" opacity="0.22"/>
  <line x1="792" y1="295" x2="870" y2="315" stroke="#2dd4bf" stroke-width="0.5" opacity="0.2"/>
  <line x1="870" y1="315" x2="950" y2="285" stroke="#14b8a6" stroke-width="0.5" opacity="0.18"/>
  <line x1="950" y1="285" x2="1032" y2="332" stroke="#2dd4bf" stroke-width="0.5" opacity="0.2"/>
  <line x1="1032" y1="332" x2="1102" y2="295" stroke="#14b8a6" stroke-width="0.5" opacity="0.18"/>
  <line x1="1102" y1="295" x2="1172" y2="325" stroke="#2dd4bf" stroke-width="0.5" opacity="0.18"/>
  <!-- Layer bridges -->
  <line x1="835" y1="172" x2="792" y2="295" stroke="#2dd4bf" stroke-width="0.4" opacity="0.14"/>
  <line x1="912" y1="242" x2="870" y2="315" stroke="#14b8a6" stroke-width="0.4" opacity="0.14"/>
  <line x1="985" y1="185" x2="950" y2="285" stroke="#2dd4bf" stroke-width="0.4" opacity="0.14"/>
  <line x1="1055" y1="260" x2="1032" y2="332" stroke="#14b8a6" stroke-width="0.4" opacity="0.14"/>
  <line x1="1125" y1="195" x2="1102" y2="295" stroke="#2dd4bf" stroke-width="0.4" opacity="0.14"/>

  <!-- Seated figure silhouette: left-center, side lit -->
  <!-- Desk surface -->
  <rect x="80" y="678" width="500" height="10" fill="#14102a" opacity="0.92"/>
  <!-- Monitor -->
  <rect x="200" y="555" width="195" height="128" rx="4" fill="#080618" opacity="0.9"/>
  <rect x="205" y="560" width="185" height="118" rx="2" fill="#0a0e1e" opacity="0.88"/>
  <!-- Code on screen - subtle glow -->
  <text x="215" y="580" font-family="monospace" font-size="7.5" fill="#2dd4bf" opacity="0.38">&gt; model.safety_eval()</text>
  <text x="215" y="595" font-family="monospace" font-size="7.5" fill="#14b8a6" opacity="0.32">constitutional_ai: active</text>
  <text x="215" y="610" font-family="monospace" font-size="7.5" fill="#2dd4bf" opacity="0.28">rlhf_reward: 0.941</text>
  <text x="215" y="625" font-family="monospace" font-size="7.5" fill="#0d9488" opacity="0.32">██████████ 100%</text>
  <text x="215" y="645" font-family="monospace" font-size="7.5" fill="#14b8a6" opacity="0.28">alignment: verified ✓</text>
  <!-- Monitor stand -->
  <rect x="288" y="683" width="18" height="12" fill="#14102a" opacity="0.88"/>
  <rect x="268" y="694" width="58" height="5" fill="#14102a" opacity="0.85"/>
  <!-- Figure: torso, shoulders, head (in profile looking at monitor) -->
  <ellipse cx="348" cy="615" rx="85" ry="58" fill="#0e0920" opacity="0.95"/>
  <ellipse cx="362" cy="534" rx="44" ry="50" fill="#0c0718" opacity="0.96"/>
  <rect x="338" y="575" width="38" height="42" fill="#0c0718" opacity="0.96"/>
  <!-- Arms resting forward on desk -->
  <ellipse cx="268" cy="678" rx="72" ry="14" fill="#0c0718" opacity="0.9"/>
  <ellipse cx="430" cy="682" rx="65" ry="12" fill="#0c0718" opacity="0.85"/>
  <!-- Rim light: amber from left on silhouette -->
  <ellipse cx="308" cy="574" rx="18" ry="62" fill="#fbbf24" opacity="0.1" filter="url(#sblur)"/>
  <!-- Screen ambient on face -->
  <ellipse cx="378" cy="540" rx="22" ry="28" fill="#2dd4bf" opacity="0.06" filter="url(#sblur)"/>

  <!-- Floor fade to black -->
  <rect x="0" y="680" width="1600" height="220" fill="url(#floor-fade)"/>

  <!-- Vignette -->
  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
