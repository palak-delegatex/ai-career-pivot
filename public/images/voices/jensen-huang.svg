<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <!-- Deep stage black -->
    <linearGradient id="stage-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#020c08"/>
      <stop offset="50%" style="stop-color:#040e0a"/>
      <stop offset="100%" style="stop-color:#030712"/>
    </linearGradient>
    <!-- Dramatic teal spot from above -->
    <radialGradient id="spotlight" cx="45%" cy="0%" r="60%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:0.32"/>
      <stop offset="40%" style="stop-color:#14b8a6;stop-opacity:0.16"/>
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0"/>
    </radialGradient>
    <!-- Green stage wash from left -->
    <radialGradient id="green-wash" cx="15%" cy="60%" r="50%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0"/>
    </radialGradient>
    <!-- Audience glow (warm, bottom) -->
    <radialGradient id="audience-glow" cx="50%" cy="100%" r="45%">
      <stop offset="0%" style="stop-color:#1a3a2e;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#030712;stop-opacity:0"/>
    </radialGradient>
    <!-- Stage floor -->
    <linearGradient id="stage-floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a14"/>
      <stop offset="100%" style="stop-color:#030712"/>
    </linearGradient>
    <!-- Figure fill -->
    <linearGradient id="fig" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#060e0a"/>
      <stop offset="100%" style="stop-color:#020805"/>
    </linearGradient>
    <!-- Floor fade -->
    <linearGradient id="floorfade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#030712;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#030712;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.6"/>
    </radialGradient>
    <filter id="gblur"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="mblur"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="sblur"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="xsblur"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <!-- Stage darkness -->
  <rect width="1600" height="900" fill="url(#stage-bg)"/>
  <rect width="1600" height="900" fill="url(#spotlight)"/>
  <rect width="1600" height="900" fill="url(#green-wash)"/>
  <rect width="1600" height="900" fill="url(#audience-glow)"/>

  <!-- ==== STAGE BACKGROUND: LED SCREEN / HOLOGRAPHIC GPU ==== -->
  <!-- Giant LED screen behind speaker -->
  <rect x="250" y="40" width="1100" height="600" fill="#030e08" opacity="0.85"/>
  <!-- Screen edge glow (teal) -->
  <rect x="248" y="38" width="1104" height="4" fill="#2dd4bf" opacity="0.3"/>
  <rect x="248" y="638" width="1104" height="4" fill="#2dd4bf" opacity="0.2"/>
  <rect x="248" y="38" width="4" height="604" fill="#2dd4bf" opacity="0.25"/>
  <rect x="1348" y="38" width="4" height="604" fill="#2dd4bf" opacity="0.25"/>

  <!-- Screen content: Holographic GPU chip diagram -->
  <!-- GPU chip outline -->
  <rect x="550" y="80" width="500" height="500" rx="20" fill="none" stroke="#2dd4bf" stroke-width="1.5" opacity="0.25"/>
  <rect x="570" y="100" width="460" height="460" rx="14" fill="none" stroke="#14b8a6" stroke-width="0.8" opacity="0.18"/>
  <!-- Die grid lines -->
  <line x1="620" y1="100" x2="620" y2="560" stroke="#2dd4bf" stroke-width="0.5" opacity="0.12"/>
  <line x1="720" y1="100" x2="720" y2="560" stroke="#2dd4bf" stroke-width="0.5" opacity="0.12"/>
  <line x1="800" y1="100" x2="800" y2="560" stroke="#2dd4bf" stroke-width="0.5" opacity="0.1"/>
  <line x1="880" y1="100" x2="880" y2="560" stroke="#2dd4bf" stroke-width="0.5" opacity="0.12"/>
  <line x1="980" y1="100" x2="980" y2="560" stroke="#2dd4bf" stroke-width="0.5" opacity="0.12"/>
  <line x1="550" y1="200" x2="1050" y2="200" stroke="#2dd4bf" stroke-width="0.5" opacity="0.12"/>
  <line x1="550" y1="300" x2="1050" y2="300" stroke="#2dd4bf" stroke-width="0.5" opacity="0.1"/>
  <line x1="550" y1="400" x2="1050" y2="400" stroke="#2dd4bf" stroke-width="0.5" opacity="0.12"/>
  <line x1="550" y1="480" x2="1050" y2="480" stroke="#2dd4bf" stroke-width="0.5" opacity="0.12"/>
  <!-- GPU core blocks (SM clusters) -->
  <rect x="575" y="105" width="40" height="90" rx="4" fill="#2dd4bf" opacity="0.12"/>
  <rect x="625" y="105" width="90" height="90" rx="4" fill="#14b8a6" opacity="0.16"/>
  <rect x="725" y="105" width="70" height="90" rx="4" fill="#2dd4bf" opacity="0.12"/>
  <rect x="805" y="105" width="70" height="90" rx="4" fill="#14b8a6" opacity="0.14"/>
  <rect x="885" y="105" width="90" height="90" rx="4" fill="#2dd4bf" opacity="0.16"/>
  <rect x="985" y="105" width="40" height="90" rx="4" fill="#14b8a6" opacity="0.12"/>
  <!-- Second row -->
  <rect x="575" y="205" width="90" height="90" rx="4" fill="#0d9488" opacity="0.14"/>
  <rect x="675" y="205" width="120" height="90" rx="4" fill="#2dd4bf" opacity="0.18"/>
  <rect x="805" y="205" width="120" height="90" rx="4" fill="#0d9488" opacity="0.16"/>
  <rect x="935" y="205" width="90" height="90" rx="4" fill="#2dd4bf" opacity="0.14"/>
  <!-- Third row: memory -->
  <rect x="575" y="305" width="450" height="85" rx="4" fill="#1a3a2e" opacity="0.2"/>
  <text x="800" y="353" font-family="monospace" font-size="14" fill="#2dd4bf" opacity="0.35" text-anchor="middle">HBM3e MEMORY</text>
  <!-- Fourth row -->
  <rect x="575" y="400" width="90" height="75" rx="4" fill="#2dd4bf" opacity="0.14"/>
  <rect x="675" y="400" width="120" height="75" rx="4" fill="#14b8a6" opacity="0.16"/>
  <rect x="805" y="400" width="120" height="75" rx="4" fill="#2dd4bf" opacity="0.14"/>
  <rect x="935" y="400" width="90" height="75" rx="4" fill="#0d9488" opacity="0.14"/>
  <!-- Bottom row -->
  <rect x="575" y="485" width="180" height="60" rx="4" fill="#14b8a6" opacity="0.12"/>
  <rect x="765" y="485" width="260" height="60" rx="4" fill="#2dd4bf" opacity="0.14"/>

  <!-- Chip label -->
  <text x="800" y="600" font-family="monospace" font-size="22" font-weight="bold" fill="#2dd4bf" opacity="0.4" text-anchor="middle">BLACKWELL H200</text>
  <text x="800" y="622" font-family="monospace" font-size="13" fill="#14b8a6" opacity="0.28" text-anchor="middle">208B transistors · 4.0 petaflops</text>

  <!-- Floating particles around chip -->
  <circle cx="480" cy="180" r="3" fill="#2dd4bf" opacity="0.45"/>
  <circle cx="520" cy="250" r="2" fill="#34d399" opacity="0.38"/>
  <circle cx="460" cy="320" r="2.5" fill="#2dd4bf" opacity="0.4"/>
  <circle cx="1130" cy="160" r="3" fill="#2dd4bf" opacity="0.45"/>
  <circle cx="1160" cy="240" r="2" fill="#34d399" opacity="0.38"/>
  <circle cx="1120" cy="380" r="2.5" fill="#2dd4bf" opacity="0.4"/>
  <circle cx="500" cy="450" r="2" fill="#14b8a6" opacity="0.35"/>
  <circle cx="1140" cy="460" r="2" fill="#14b8a6" opacity="0.35"/>

  <!-- ==== STAGE FLOOR ==== -->
  <rect x="0" y="640" width="1600" height="260" fill="url(#stage-floor)" opacity="0.8"/>
  <!-- Stage edge / lip highlight -->
  <line x1="0" y1="645" x2="1600" y2="645" stroke="#2dd4bf" stroke-width="1.5" opacity="0.15"/>
  <!-- Stage floor reflections (blurred) -->
  <ellipse cx="680" cy="700" rx="120" ry="18" fill="#2dd4bf" opacity="0.06" filter="url(#mblur)"/>

  <!-- Spotlight beam from ceiling (hard cone) -->
  <polygon points="700,0 780,0 820,640 660,640" fill="#2dd4bf" opacity="0.04"/>
  <polygon points="720,0 760,0 790,640 690,640" fill="#2dd4bf" opacity="0.04"/>

  <!-- ==== AUDIENCE (blur of lights below) ==== -->
  <!-- Audience dots -->
  <circle cx="150" cy="830" r="2" fill="#fbbf24" opacity="0.35"/>
  <circle cx="220" cy="810" r="1.5" fill="#fbbf24" opacity="0.3"/>
  <circle cx="310" cy="840" r="2" fill="#fbbf24" opacity="0.28"/>
  <circle cx="400" cy="820" r="1.5" fill="#ffffff" opacity="0.25"/>
  <circle cx="490" cy="845" r="2" fill="#fbbf24" opacity="0.3"/>
  <circle cx="570" cy="815" r="1.5" fill="#ffffff" opacity="0.22"/>
  <circle cx="660" cy="850" r="2" fill="#fbbf24" opacity="0.28"/>
  <circle cx="760" cy="825" r="1.5" fill="#ffffff" opacity="0.25"/>
  <circle cx="850" cy="855" r="2" fill="#fbbf24" opacity="0.28"/>
  <circle cx="940" cy="820" r="1.5" fill="#ffffff" opacity="0.22"/>
  <circle cx="1030" cy="840" r="2" fill="#fbbf24" opacity="0.3"/>
  <circle cx="1120" cy="812" r="1.5" fill="#fbbf24" opacity="0.28"/>
  <circle cx="1200" cy="848" r="2" fill="#ffffff" opacity="0.22"/>
  <circle cx="1300" cy="822" r="1.5" fill="#fbbf24" opacity="0.3"/>
  <circle cx="1400" cy="852" r="2" fill="#fbbf24" opacity="0.28"/>
  <circle cx="1480" cy="818" r="1.5" fill="#ffffff" opacity="0.25"/>
  <!-- Phone lights -->
  <rect x="180" y="840" width="8" height="5" rx="1" fill="#ffffff" opacity="0.15"/>
  <rect x="350" y="832" width="8" height="5" rx="1" fill="#ffffff" opacity="0.12"/>
  <rect x="530" y="848" width="8" height="5" rx="1" fill="#ffffff" opacity="0.15"/>
  <rect x="720" y="836" width="8" height="5" rx="1" fill="#ffffff" opacity="0.12"/>
  <rect x="910" y="852" width="8" height="5" rx="1" fill="#ffffff" opacity="0.15"/>
  <rect x="1090" y="838" width="8" height="5" rx="1" fill="#ffffff" opacity="0.12"/>
  <rect x="1270" y="845" width="8" height="5" rx="1" fill="#ffffff" opacity="0.15"/>
  <rect x="1450" y="830" width="8" height="5" rx="1" fill="#ffffff" opacity="0.12"/>

  <!-- ==== FIGURE: dynamic presenter, forward lean, leather jacket ==== -->
  <!-- Body: upright, slightly forward lean, center-stage -->
  <ellipse cx="720" cy="560" rx="90" ry="75" fill="url(#fig)" opacity="0.95"/>
  <!-- Jacket shape (wider shoulders) -->
  <ellipse cx="720" cy="490" rx="100" ry="28" fill="#050a06" opacity="0.96"/>
  <!-- Head (slight forward tilt) -->
  <ellipse cx="728" cy="410" rx="52" ry="58" fill="#040905" opacity="0.96"/>
  <!-- Neck -->
  <rect x="706" y="455" width="40" height="38" fill="#040905" opacity="0.96"/>
  <!-- Arms: one gesturing forward toward audience -->
  <!-- Left arm at side -->
  <rect x="620" y="490" width="32" height="120" rx="14" fill="#050a06" opacity="0.92"/>
  <!-- Right arm raised/extended toward screen -->
  <rect x="778" y="472" width="30" height="115" rx="14" fill="#050a06" opacity="0.92" transform="rotate(-35 778 472)"/>
  <!-- Pointing hand -->
  <circle cx="855" cy="530" r="16" fill="#040905" opacity="0.9"/>
  <!-- Legs -->
  <rect x="680" y="635" width="42" height="140" rx="10" fill="#050a06" opacity="0.9"/>
  <rect x="718" y="635" width="42" height="140" rx="10" fill="#040905" opacity="0.9"/>

  <!-- Stage shadow / feet -->
  <ellipse cx="720" cy="775" rx="90" ry="14" fill="#000000" opacity="0.4" filter="url(#sblur)"/>

  <!-- Teal spotlight on figure from above -->
  <ellipse cx="720" cy="480" rx="110" ry="180" fill="#2dd4bf" opacity="0.07" filter="url(#mblur)"/>
  <!-- Top light rim on head (teal) -->
  <ellipse cx="728" cy="390" rx="40" ry="20" fill="#2dd4bf" opacity="0.12" filter="url(#xsblur)"/>

  <!-- Green rim light from left -->
  <ellipse cx="648" cy="500" rx="22" ry="80" fill="#34d399" opacity="0.1" filter="url(#sblur)"/>

  <!-- Stage mic stand (subtle) -->
  <line x1="680" y1="600" x2="680" y2="780" stroke="#1a2e22" stroke-width="3" opacity="0.5"/>
  <ellipse cx="680" cy="598" rx="10" ry="6" fill="#1a2e22" opacity="0.6"/>

  <!-- Floor fade to black -->
  <rect x="0" y="730" width="1600" height="170" fill="url(#floorfade)"/>

  <!-- Vignette -->
  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
