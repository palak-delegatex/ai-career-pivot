  <line x1="752" y1="395" x2="868" y2="375" stroke="#fde68a" stroke-width="0.5" opacity="0.15"/>

  <!-- Chalk annotation -->
  <text x="500" y="165" font-family="serif" font-size="13" fill="#fde68a" opacity="0.38" font-style="italic">backpropagation</text>
  <line x1="498" y1="170" x2="488" y2="188" stroke="#fde68a" stroke-width="0.8" opacity="0.25"/>

  <!-- ==== FIGURE (professor, standing, in profile) ==== -->
  <!-- Body - tall standing figure left of chalkboard -->
  <rect x="268" y="380" width="100" height="380" rx="8" fill="url(#fig)" opacity="0.92"/>
  <!-- Shoulders broader -->
  <ellipse cx="318" cy="385" rx="68" ry="22" fill="#110d04" opacity="0.95"/>
  <!-- Head (in profile, slightly angled toward board) -->
