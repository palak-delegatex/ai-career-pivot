  <text x="880" y="445" font-family="sans-serif" font-size="11" fill="#e5e5e5" opacity="0.32" text-anchor="middle">Output</text>

  <!-- Connection lines (selected subset for readability) -->
  <line x1="472" y1="200" x2="588" y2="175" stroke="#e5e5e5" stroke-width="0.5" opacity="0.18"/>
  <line x1="472" y1="200" x2="588" y2="235" stroke="#e5e5e5" stroke-width="0.5" opacity="0.18"/>
