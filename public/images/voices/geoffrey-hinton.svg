  <line x1="472" y1="350" x2="588" y2="355" stroke="#e5e5e5" stroke-width="0.5" opacity="0.18"/>
  <line x1="472" y1="400" x2="588" y2="415" stroke="#e5e5e5" stroke-width="0.5" opacity="0.15"/>
  <line x1="612" y1="175" x2="728" y2="185" stroke="#fde68a" stroke-width="0.5" opacity="0.2"/>
