  <rect x="30" y="215" width="14" height="119" fill="#5c2800" opacity="0.6"/>
  <rect x="46" y="208" width="20" height="126" fill="#1e3a1e" opacity="0.65"/>
  <rect x="68" y="212" width="16" height="122" fill="#3a1800" opacity="0.6"/>
  <rect x="86" y="207" width="22" height="127" fill="#1a1a4a" opacity="0.65"/>
  <rect x="110" y="214" width="15" height="120" fill="#4a2000" opacity="0.6"/>
  <rect x="127" y="210" width="19" height="124" fill="#2a3a00" opacity="0.65"/>
  <rect x="148" y="215" width="13" height="119" fill="#1a3a4a" opacity="0.6"/>
  <rect x="163" y="208" width="21" height="126" fill="#4a1800" opacity="0.65"/>
  <rect x="186" y="212" width="17" height="122" fill="#1e2a3a" opacity="0.6"/>
  <rect x="205" y="209" width="20" height="125" fill="#3a2200" opacity="0.65"/>
  <rect x="227" y="215" width="14" height="119" fill="#1a2a1a" opacity="0.6"/>
  <rect x="243" y="211" width="18" height="123" fill="#4a3000" opacity="0.65"/>
  <rect x="263" y="208" width="22" height="126" fill="#1a2a3a" opacity="0.6"/>
  <rect x="287" y="213" width="16" height="121" fill="#3a1a00" opacity="0.65"/>
  <rect x="305" y="210" width="19" height="124" fill="#1a2a2a" opacity="0.6"/>

  <!-- Right bookshelf -->
  <rect x="1260" y="100" width="340" height="700" fill="url(#shelf)" opacity="0.9"/>
  <rect x="1260" y="200" width="340" height="6" fill="#1e1508" opacity="0.75"/>
  <rect x="1260" y="340" width="340" height="6" fill="#1e1508" opacity="0.75"/>
