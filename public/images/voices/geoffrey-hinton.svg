  <!-- ==== CHALKBOARD (center-back) ==== -->
  <rect x="400" y="80" width="600" height="420" fill="url(#chalkboard)" opacity="0.95"/>
  <!-- Chalkboard frame (wood) -->
  <rect x="392" y="72" width="616" height="12" fill="#2a1e08" opacity="0.9"/>
  <rect x="392" y="492" width="616" height="12" fill="#2a1e08" opacity="0.9"/>
  <rect x="392" y="72" width="12" height="432" fill="#2a1e08" opacity="0.9"/>
  <rect x="996" y="72" width="12" height="432" fill="#2a1e08" opacity="0.9"/>
  <!-- Chalk ledge -->
  <rect x="392" y="490" width="616" height="20" fill="#221808" opacity="0.8"/>
  <!-- Chalk dust -->
  <rect x="440" y="492" width="18" height="4" fill="#e5e5e5" opacity="0.15"/>
  <rect x="510" y="492" width="12" height="4" fill="#e5e5e5" opacity="0.12"/>
  <rect x="620" y="492" width="20" height="4" fill="#e5e5e5" opacity="0.1"/>

  <!-- Neural network diagram on chalkboard (chalk style) -->
  <!-- Title -->
  <text x="700" y="125" font-family="serif" font-size="20" fill="#e5e5e5" opacity="0.55" text-anchor="middle">DEEP NEURAL NETWORK</text>
  <line x1="440" y1="135" x2="960" y2="135" stroke="#e5e5e5" stroke-width="0.5" opacity="0.2"/>

  <!-- Input layer nodes -->
  <circle cx="460" cy="200" r="12" fill="none" stroke="#e5e5e5" stroke-width="1.2" opacity="0.4"/>
  <circle cx="460" cy="250" r="12" fill="none" stroke="#e5e5e5" stroke-width="1.2" opacity="0.4"/>
  <circle cx="460" cy="300" r="12" fill="none" stroke="#e5e5e5" stroke-width="1.2" opacity="0.4"/>
  <circle cx="460" cy="350" r="12" fill="none" stroke="#e5e5e5" stroke-width="1.2" opacity="0.4"/>
  <circle cx="460" cy="400" r="12" fill="none" stroke="#e5e5e5" stroke-width="1.2" opacity="0.35"/>
  <text x="460" y="445" font-family="sans-serif" font-size="11" fill="#e5e5e5" opacity="0.35" text-anchor="middle">Input</text>

  <!-- Hidden layer 1 -->
  <circle cx="600" cy="175" r="12" fill="none" stroke="#fde68a" stroke-width="1.2" opacity="0.38"/>
  <circle cx="600" cy="235" r="12" fill="none" stroke="#fde68a" stroke-width="1.2" opacity="0.38"/>
  <circle cx="600" cy="295" r="12" fill="none" stroke="#fde68a" stroke-width="1.2" opacity="0.38"/>
  <circle cx="600" cy="355" r="12" fill="none" stroke="#fde68a" stroke-width="1.2" opacity="0.38"/>
  <circle cx="600" cy="415" r="12" fill="none" stroke="#fde68a" stroke-width="1.2" opacity="0.32"/>
  <text x="600" y="445" font-family="sans-serif" font-size="11" fill="#fde68a" opacity="0.32" text-anchor="middle">Hidden 1</text>

  <!-- Hidden layer 2 -->
  <circle cx="740" cy="185" r="12" fill="none" stroke="#fde68a" stroke-width="1.2" opacity="0.36"/>
  <circle cx="740" cy="255" r="12" fill="none" stroke="#fde68a" stroke-width="1.2" opacity="0.36"/>
