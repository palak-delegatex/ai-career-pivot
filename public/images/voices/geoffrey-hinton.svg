<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <!-- Warm deep library dark: wood + shadow -->
    <linearGradient id="room" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0c08"/>
      <stop offset="50%" style="stop-color:#100e08"/>
      <stop offset="100%" style="stop-color:#030712"/>
    </linearGradient>
    <!-- Golden hour sunbeam from right window -->
    <radialGradient id="sunbeam" cx="90%" cy="25%" r="50%">
      <stop offset="0%" style="stop-color:#fde68a;stop-opacity:0.28"/>
      <stop offset="40%" style="stop-color:#fbbf24;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
    <!-- Secondary warm fill -->
    <radialGradient id="warmfill" cx="65%" cy="40%" r="45%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </radialGradient>
    <!-- Bookshelves gradient -->
    <linearGradient id="shelf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1208"/>
      <stop offset="100%" style="stop-color:#0d0a05"/>
    </linearGradient>
    <!-- Chalkboard surface -->
    <linearGradient id="chalkboard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1a14"/>
      <stop offset="100%" style="stop-color:#0a1410"/>
    </linearGradient>
    <!-- Floor fade -->
    <linearGradient id="floorfade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#030712;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#030712;stop-opacity:1"/>
    </linearGradient>
    <!-- Figure dark -->
    <linearGradient id="fig" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#120d04"/>
      <stop offset="100%" style="stop-color:#080604"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.6"/>
    </radialGradient>
    <filter id="gblur"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="mblur"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="sblur"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <!-- Room base -->
  <rect width="1600" height="900" fill="url(#room)"/>
  <rect width="1600" height="900" fill="url(#sunbeam)"/>
  <rect width="1600" height="900" fill="url(#warmfill)"/>

