  <!-- Shelf planks -->
  <rect x="0" y="100" width="340" height="700" fill="url(#shelf)" opacity="0.95"/>
  <!-- Shelf horizontal planks -->
  <rect x="0" y="200" width="340" height="6" fill="#1e1508" opacity="0.8"/>
  <rect x="0" y="340" width="340" height="6" fill="#1e1508" opacity="0.8"/>
  <rect x="0" y="480" width="340" height="6" fill="#1e1508" opacity="0.8"/>
  <rect x="0" y="620" width="340" height="6" fill="#1e1508" opacity="0.8"/>
  <!-- Book spines - row 1 (100-200) -->
