  <rect x="1565" y="110" width="19" height="84" fill="#1a2a1e" opacity="0.6"/>

  <!-- ==== TALL WINDOW (right of center) - golden hour light ==== -->
  <!-- Window frame -->
  <rect x="1050" y="0" width="200" height="800" fill="#1a1408" opacity="0.05"/>
  <!-- Window light beam -->
  <polygon points="1050,0 1250,0 1400,900 900,900" fill="#fde68a" opacity="0.04"/>
  <!-- Dust particles in sunbeam -->
  <circle cx="1100" cy="150" r="2" fill="#fde68a" opacity="0.4"/>
  <circle cx="1130" cy="220" r="1.5" fill="#fbbf24" opacity="0.35"/>
